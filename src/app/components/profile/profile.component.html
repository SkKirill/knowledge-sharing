<div class="container">
  <!-- Profile Block -->
  <div class="card profile-card">
    <div class="form-group">
      <input type="file" accept="image/*">
      <img src="assets/avatar-placeholder.png" class="profile-img" alt="Avatar">
    </div>
    <div class="form-group">
      <label>Фамилия</label>
      <input type="text" placeholder="Введите фамилию">
    </div>
    <div class="form-group">
      <label>Имя</label>
      <input type="text" placeholder="Введите имя">
    </div>
    <div class="form-group">
      <label>Отчество</label>
      <input type="text" placeholder="Введите отчество">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" placeholder="Введите почту">
    </div>
    <div class="form-group">
      <label>Телефон</label>
      <input type="tel" placeholder="Введите номер телефона">
    </div>
    <button class="button">Сохранить</button>
  </div>

  <!-- Knowledge Blocks -->
  <div class="knowledge-container">
    <div class="card">
      <div class="section-title">Хочу получить знания</div>
      <ul class="item-list">
        <li>
          <input type="text" placeholder="Добавить знание">
          <button>Удалить</button>
        </li>
        <!-- Добавлять динамически -->
      </ul>
      <button class="button">Добавить</button>
    </div>

    <div class="card">
      <div class="section-title">Хочу поделиться знаниями</div>
      <ul class="item-list">
        <li>
          <input type="text" placeholder="Добавить знание">
          <button>Удалить</button>
        </li>
        <!-- Добавлять динамически -->
      </ul>
      <button class="button">Добавить</button>
    </div>
  </div>
</div>
